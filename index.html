<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الثوابت الوزارية | @raslen_mods</title>
    <style>
        :root { --p: #1a1a2e; --s: #16213e; --a: #e94560; --t: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1b; color: var(--t); margin: 0; text-align: center; }
        header { background: var(--p); padding: 25px; border-bottom: 3px solid var(--a); }
        .tabs { display: flex; overflow-x: auto; background: var(--s); sticky; top: 0; border-bottom: 1px solid #333; }
        .tab-btn { flex: 0 0 auto; padding: 15px 20px; border: none; background: none; color: #aaa; cursor: pointer; font-size: 1rem; }
        .tab-btn.active { color: var(--a); border-bottom: 3px solid var(--a); font-weight: bold; }
        .container { max-width: 700px; margin: 20px auto; padding: 15px; }
        .content { display: none; animation: fadeIn 0.4s; }
        .content.active { display: block; }
        .card { background: var(--s); border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; border-right: 4px solid var(--a); }
        .btn-pdf { display: block; background: #27ae60; color: white; padding: 15px; border-radius: 8px; text-decoration: none; margin-top: 20px; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        footer { padding: 20px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>🎓 دليل الثوابت الوزارية</h1>
    <p>إعداد المبرمج Atter (@raslen_mods)</p>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="show(event, 'soc')">الاجتماعيات</button>
    <button class="tab-btn" onclick="show(event, 'phy')">الفيزياء</button>
    <button class="tab-btn" onclick="show(event, 'chem')">الكيمياء</button>
    <button class="tab-btn" onclick="show(event, 'bio')">الأحياء</button>
    <button class="tab-btn" onclick="show(event, 'math')">الرياضيات</button>
    <button class="tab-btn" onclick="show(event, 'ar')">العربي</button>
    <button class="tab-btn" onclick="show(event, 'en')">الأنجليزي</button>
</div>

<div class="container">
    <div id="soc" class="content active">
        <div class="card"><span>ثورة العشرين</span><b>مكرر جداً</b></div>
        <div class="card"><span>عوامل قيام الصناعة</span><b>10 مرات</b></div>
        <a href="وزاريات_الثالث_المتوسط_المرتبة.pdf" class="btn-pdf">📥 تحميل ملف الاجتماعيات PDF</a>
    </div>

    <div id="phy" class="content">
        <div class="card"><span>قانون كولوم</span><b>ثابت سنوياً</b></div>
        <div class="card"><span>المحولة الكهربائية</span><b>مكرر</b></div>
        <a href="وزاريات_الثالث_المتوسط_المرتبة.pdf" class="btn-pdf">📥 تحميل ملف الفيزياء PDF</a>
    </div>

    <div id="chem" class="content">
        <div class="card"><span>الكشف عن الصوديوم</span><b>مهم جداً</b></div>
        <a href="وزاريات_الثالث_المتوسط_المرتبة.pdf" class="btn-pdf">📥 تحميل ملف الكيمياء PDF</a>
    </div>
</div>

<footer>حقوق الطبع محفوظة 2026 - Atter Projects</footer>

<script>
    function show(e, name) {
        var i, c, t;
        c = document.getElementsByClassName("content");
        for (i = 0; i < c.length; i++) c[i].style.display = "none";
        t = document.getElementsByClassName("tab-btn");
        for (i = 0; i < t.length; i++) t[i].className = t[i].className.replace(" active", "");
        document.getElementById(name).style.display = "block";
        e.currentTarget.className += " active";
    }
</script>
</body>
</html>
