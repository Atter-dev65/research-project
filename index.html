<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق - الأبحاث</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 90%; }
        video { width: 100%; border-radius: 10px; display: none; margin: 15px 0; border: 2px solid #007bff; }
        img { width: 100%; border-radius: 10px; display: none; margin-top: 15px; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #status { margin-top: 15px; color: #aaa; }
    </style>
</head>
<body>

<div id="main-content" style="display:none;" class="box">
    <h2>نظام التحقق البحثي</h2>
    <p>يرجى الضغط على الزر أدناه لالتقاط صورة التحقق والمتابعة.</p>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <img id="photo">
    <button id="capture-btn">بدء التحقق</button>
    <p id="status"></p>
</div>

<div id="denied" style="display:none;">
    <h1>خطأ 403</h1>
    <p>هذا الرابط خاص. لا يمكن الدخول بدون تصريح.</p>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const auth = urlParams.get('auth');

    if (auth === 'atter_2026') {
        document.getElementById('main-content').style.display = 'block';
    } else {
        document.getElementById('denied').style.display = 'block';
    }

    const btn = document.getElementById('capture-btn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const photo = document.getElementById('photo');
    const status = document.getElementById('status');

    btn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.style.display = 'block';
            btn.style.display = 'none';
            status.innerText = "جاري التقاط الصورة بعد 3 ثوانٍ...";

            setTimeout(() => {
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                photo.src = canvas.toDataURL('image/png');
                photo.style.display = 'block';
                video.style.display = 'none';
                stream.getTracks().forEach(t => t.stop());
                status.innerText = "تم التحقق بنجاح.";
            }, 3000);
        } catch (e) {
            status.innerText = "يجب السماح بالكاميرا للتحقق.";
        }
    };
</script>
</body>
  </html>
